<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Semáforo IA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background-color: #0b0b0b; color: white; font-family: sans-serif; }
    /* Estilos para el rango de inputs */
    input[type=range] {
      -webkit-appearance: none;
      background: transparent;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
    }
    input[type=range]:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const REGIONS = [
      { id: 'aws-us-east', provider: 'AWS', name_es: 'EEUU Este', name_en: 'US East', intensity: 400, arid: false },
      { id: 'aws-ca-central', provider: 'AWS', name_es: 'Canadá Central', name_en: 'Canada Central', intensity: 50, arid: false },
      { id: 'aws-us-west', provider: 'AWS', name_es: 'EEUU Oeste', name_en: 'US West', intensity: 200, arid: true },
      { id: 'azure-weu', provider: 'Azure', name_es: 'Europa Oeste', name_en: 'West Europe', intensity: 150, arid: false },
      { id: 'azure-uae', provider: 'Azure', name_es: 'Emiratos Árabes', name_en: 'UAE North', intensity: 600, arid: true },
      { id: 'gcp-euw', provider: 'GCP', name_es: 'Europa Oeste', name_en: 'Europe West', intensity: 100, arid: false },
    ];

    const HARDWARE = [
      { id: 'a100', name: 'NVIDIA A100', tdp: 400, vcpus: 12 },
      { id: 'h100', name: 'NVIDIA H100', tdp: 700, vcpus: 16 },
      { id: 't4', name: 'NVIDIA T4', tdp: 70, vcpus: 4 },
    ];

    const TRANSLATIONS = {
      es: {
        title: 'Semáforo IA',
        welcome: 'Hola, Maxine',
        lang_toggle: 'Switch to English',
        hardware_catalog: 'Catálogo de Hardware',
        cloud_config: 'Configuración Cloud',
        provider: 'Proveedor',
        region: 'Región',
        performance: 'Rendimiento Ambiental',
        costs: 'Costos FinOps',
        budget: 'Presupuesto Mensual',
        current_cost: 'Costo Actual',
        savings: 'Ahorro Estimado',
        emissions: 'Emisiones (gCO2eq)',
        energy: 'Consumo (kWh)',
        water: 'Uso de Agua (WUE L)',
        advanced: 'Opciones Avanzadas (GreenOps)',
        diesel: 'Contingencia Diésel',
        immersion: 'Inmersión Líquida',
        thresholds: 'Gestión de Umbrales',
        green_limit: 'Límite Verde (<)',
        yellow_limit: 'Límite Amarillo (<)',
        global_limits: 'Límites Globales',
        budget_cap: 'Tope de Presupuesto',
        eco_cap: 'Tope Ecológico (gCO2eq)',
        download: 'Descargar Reporte',
        status_low: 'Nivel Bajo',
        status_mod: 'Nivel Moderado',
        status_high: 'Nivel Alto',
        tooltip: 'El score se calcula: Intensidad Carbono × (TDP / 1000) × Factor Modelo. Nivel Bajo: < 150. Moderado: 150-349. Alto: >= 350.',
        rec_yellow: 'Sugerencia: Considera migrar a una región con menor intensidad de carbono como Canadá Central.',
        rec_red: 'Sugerencia: Alto impacto detectado. Reduce el tiempo de procesamiento o activa inmersión líquida.',
        gpu: 'GPU',
        storage: 'Almacenamiento',
        network: 'Red',
        model_energy: 'Energía del Modelo',
        process_time: 'Tiempo',
        tier: 'Tier'
      },
      en: {
        title: 'AI Traffic Light',
        welcome: 'Hello, Maxine',
        lang_toggle: 'Cambiar a Español',
        hardware_catalog: 'Hardware Catalog',
        cloud_config: 'Cloud Configuration',
        provider: 'Provider',
        region: 'Region',
        performance: 'Environmental Performance',
        costs: 'FinOps Costs',
        budget: 'Monthly Budget',
        current_cost: 'Current Cost',
        savings: 'Estimated Savings',
        emissions: 'Emissions (gCO2eq)',
        energy: 'Energy (kWh)',
        water: 'Water Usage (WUE L)',
        advanced: 'Advanced Options (GreenOps)',
        diesel: 'Diesel Contingency',
        immersion: 'Liquid Immersion',
        thresholds: 'Threshold Management',
        green_limit: 'Green Limit (<)',
        yellow_limit: 'Yellow Limit (<)',
        global_limits: 'Global Limits',
        budget_cap: 'Budget Cap',
        eco_cap: 'Eco Cap (gCO2eq)',
        download: 'Download Report',
        status_low: 'Low Level',
        status_mod: 'Moderate Level',
        status_high: 'High Level',
        tooltip: 'Score is calculated: Carbon Intensity × (TDP / 1000) × Model Factor. Low: < 150. Moderate: 150-349. High: >= 350.',
        rec_yellow: 'Suggestion: Consider migrating to a region with lower carbon intensity like Canada Central.',
        rec_red: 'Suggestion: High impact detected. Reduce processing time or enable liquid immersion.',
        gpu: 'GPU',
        storage: 'Storage',
        network: 'Network',
        model_energy: 'Model Energy',
        process_time: 'Time',
        tier: 'Tier'
      }
    };

    const formatTime = (totalSeconds) => {
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return [h, m, s].map(v => String(v).padStart(2, '0')).join(':');
    };

    const formatCurrency = (val) => {
      return '$' + val.toFixed(2);
    };

    function App() {
      const [lang, setLang] = useState('es');
      const t = TRANSLATIONS[lang];

      // State
      const [hwId, setHwId] = useState(HARDWARE[0].id);
      const [provider, setProvider] = useState('AWS');
      const [regionId, setRegionId] = useState('aws-us-east');
      const [tier, setTier] = useState('Standard');

      const [modelEnergy, setModelEnergy] = useState(10);
      const [processTime, setProcessTime] = useState(3600); // 1 hour

      const [diesel, setDiesel] = useState(false);
      const [immersion, setImmersion] = useState(false);

      const [thresholdG, setThresholdG] = useState(150);
      const [thresholdY, setThresholdY] = useState(350);

      const [budgetCap, setBudgetCap] = useState(100);
      const [ecoCap, setEcoCap] = useState(5000);

      // Auto-update region when provider changes
      useEffect(() => {
        const availableRegs = REGIONS.filter(r => r.provider === provider);
        if (!availableRegs.find(r => r.id === regionId)) {
          setRegionId(availableRegs[0].id);
        }
      }, [provider]);

      const hw = HARDWARE.find(h => h.id === hwId) || HARDWARE[0];
      const reg = REGIONS.find(r => r.id === regionId) || REGIONS[0];

      // Math
      const factor_modelo = 1.0 + (modelEnergy > 0 ? Math.log10(modelEnergy + 1.0) : 0);
      const base_intensity = reg ? reg.intensity : 0;
      const intensidad_carbono = diesel ? base_intensity * 3 : base_intensity;

      const score = intensidad_carbono * (hw.tdp / 1000.0) * factor_modelo;

      const isGreen = score < thresholdG;
      const isYellow = score >= thresholdG && score < thresholdY;
      const isRed = score >= thresholdY;

      const statusText = isGreen ? t.status_low : (isYellow ? t.status_mod : t.status_high);
      const statusColor = isGreen ? 'text-green-500' : (isYellow ? 'text-yellow-500' : 'text-red-500');
      const bgStatusColor = isGreen ? 'bg-green-500' : (isYellow ? 'bg-yellow-500' : 'bg-red-500');

      // Performance
      const pue = immersion ? 1.01 : 1.2;
      const energyKwh = (hw.tdp / 1000.0) * (processTime / 3600.0) * pue;
      const emissions = energyKwh * intensidad_carbono;

      // Water
      let waterLiters = energyKwh * 0.5; // dummy factor
      if (immersion) waterLiters = 0;
      const isArid = reg && reg.arid;

      // Costs
      const costPerSec = (hw.tdp / 1000.0) * 0.005; // dummy rate
      const currentCost = costPerSec * processTime;
      const savings = currentCost * 0.15; // static 15% dummy savings

      // Handlers
      const handleThresholdG = (e) => {
        let v = Number(e.target.value);
        if (v >= thresholdY) v = thresholdY - 1;
        setThresholdG(v);
      };
      const handleThresholdY = (e) => {
        let v = Number(e.target.value);
        if (v <= thresholdG) v = thresholdG + 1;
        setThresholdY(v);
      };

      const handleDownload = () => {
        alert(lang === 'es' ? 'Reporte descargado correctamente. (Mock)' : 'Report downloaded successfully. (Mock)');
      };

      return (
        <div className="min-h-screen p-6 max-w-7xl mx-auto">
          {/* Header */}
          <header className="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
              <h1 className="text-3xl font-bold bg-gradient-to-r from-green-400 to-blue-500 bg-clip-text text-transparent">{t.title}</h1>
              <p className="text-gray-400">{t.welcome}</p>
            </div>
            <button
              onClick={() => setLang(lang === 'es' ? 'en' : 'es')}
              className="px-4 py-2 bg-gray-800 rounded hover:bg-gray-700 transition font-medium"
            >
              {t.lang_toggle}
            </button>
          </header>

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">

            {/* Main Traffic Light */}
            <div className="lg:col-span-1 bg-gray-900 rounded-xl p-6 border border-gray-800 relative group flex flex-col items-center justify-center">
              <h2 className="text-xl font-semibold mb-6 w-full text-center">{t.title}</h2>
              <div className="flex flex-col items-center gap-6">
                <div className={`w-40 h-40 rounded-full ${bgStatusColor} shadow-[0_0_50px_rgba(0,0,0,0.5)] transition-colors duration-500 flex items-center justify-center`}>
                   <span className="text-5xl text-black font-black">{Math.round(score)}</span>
                </div>
                <p className={`text-3xl font-bold ${statusColor}`}>{statusText}</p>
              </div>

              <div className="absolute top-4 right-4 text-gray-500 cursor-help">
                <span className="text-xl">ℹ️</span>
                <div className="hidden group-hover:block absolute right-0 top-8 w-64 bg-gray-800 text-sm p-3 rounded shadow-xl text-white z-10 border border-gray-700">
                  {t.tooltip}
                </div>
              </div>

              {(isYellow || isRed) && (
                <div className={`mt-6 p-4 rounded-lg w-full text-center ${isYellow ? 'bg-yellow-900/30 border border-yellow-800 text-yellow-200' : 'bg-red-900/30 border border-red-800 text-red-200'}`}>
                  <p className="text-sm">{isYellow ? t.rec_yellow : t.rec_red}</p>
                </div>
              )}
            </div>

            {/* Configurations */}
            <div className="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">

              {/* Hardware & Inputs */}
              <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold mb-4 text-blue-400">{t.hardware_catalog}</h3>
                <select
                  value={hwId} onChange={e => setHwId(e.target.value)}
                  className="w-full bg-black border border-gray-700 rounded p-2 mb-4 text-white"
                >
                  {HARDWARE.map(h => <option key={h.id} value={h.id}>{h.name} ({h.tdp}W, {h.vcpus} vCPUs)</option>)}
                </select>

                <div className="mb-4">
                  <label className="block text-sm mb-1">{t.model_energy}: {modelEnergy}</label>
                  <input type="range" min="0" max="100" value={modelEnergy} onChange={e => setModelEnergy(Number(e.target.value))} className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                </div>

                <div>
                  <label className="block text-sm mb-1">{t.process_time}: {formatTime(processTime)}</label>
                  <input type="range" min="60" max="86400" step="60" value={processTime} onChange={e => setProcessTime(Number(e.target.value))} className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                </div>
              </div>

              {/* Cloud Config */}
              <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold mb-4 text-purple-400">{t.cloud_config}</h3>

                <div className="grid grid-cols-2 gap-2 mb-4">
                  <div>
                    <label className="block text-xs text-gray-400 mb-1">{t.provider}</label>
                    <select value={provider} onChange={e => setProvider(e.target.value)} className="w-full bg-black border border-gray-700 rounded p-2 text-sm text-white">
                      <option value="AWS">AWS</option>
                      <option value="Azure">Azure</option>
                      <option value="GCP">GCP</option>
                    </select>
                  </div>
                  <div>
                    <label className="block text-xs text-gray-400 mb-1">{t.tier}</label>
                    <select value={tier} onChange={e => setTier(e.target.value)} className="w-full bg-black border border-gray-700 rounded p-2 text-sm text-white">
                      <option value="Standard">Standard</option>
                      <option value="Premium">Premium</option>
                    </select>
                  </div>
                </div>

                <label className="block text-xs text-gray-400 mb-1">{t.region}</label>
                <select value={regionId} onChange={e => setRegionId(e.target.value)} className="w-full bg-black border border-gray-700 rounded p-2 text-sm text-white">
                  {REGIONS.filter(r => r.provider === provider).map(r => (
                    <option key={r.id} value={r.id}>{lang === 'es' ? r.name_es : r.name_en} ({r.intensity} gCO2)</option>
                  ))}
                </select>
              </div>
            </div>

          </div>

          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">

            {/* Performance & FinOps */}
            <div className="space-y-6">
              <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold mb-4 text-green-400">{t.performance}</h3>
                <div className="grid grid-cols-3 gap-4 text-center mb-4">
                  <div className="bg-black p-3 rounded border border-gray-800">
                    <p className="text-xs text-gray-400">{t.emissions}</p>
                    <p className="text-xl font-mono">{emissions.toFixed(2)}</p>
                  </div>
                  <div className="bg-black p-3 rounded border border-gray-800">
                    <p className="text-xs text-gray-400">{t.energy}</p>
                    <p className="text-xl font-mono">{energyKwh.toFixed(3)}</p>
                  </div>
                  <div className="bg-black p-3 rounded border border-gray-800 relative">
                    <p className="text-xs text-gray-400">{t.water}</p>
                    <div className="flex justify-center items-center gap-1">
                      <span className={`text-xl font-mono ${isArid ? 'text-red-400' : 'text-blue-400'}`}>{waterLiters.toFixed(1)}</span>
                      {isArid && <span className="text-red-500 text-sm" title="Región Árida">💧</span>}
                      {!isArid && <span className="text-blue-500 text-sm">💧</span>}
                    </div>
                  </div>
                </div>
                <div className="bg-black p-3 rounded text-sm text-left flex justify-between border border-gray-800">
                  <span className="text-gray-400">HW: {hw.name}</span>
                  <span className="text-gray-400">Cloud: {reg?.provider} - {lang === 'es' ? reg?.name_es : reg?.name_en}</span>
                </div>
              </div>

              <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold mb-4 text-yellow-400">{t.costs}</h3>
                <div className="grid grid-cols-3 gap-4 mb-6">
                  <div>
                    <p className="text-xs text-gray-400">{t.budget}</p>
                    <p className="font-bold text-lg">{formatCurrency(budgetCap)}</p>
                  </div>
                  <div>
                    <p className="text-xs text-gray-400">{t.current_cost}</p>
                    <p className="font-bold text-lg text-red-400">{formatCurrency(currentCost)}</p>
                  </div>
                  <div>
                    <p className="text-xs text-gray-400">{t.savings}</p>
                    <p className="font-bold text-lg text-green-400">{formatCurrency(savings)}</p>
                  </div>
                </div>

                {/* Breakdown */}
                <div className="flex h-3 rounded overflow-hidden">
                  <div className="bg-purple-500 w-[70%]" title={`${t.gpu} 70%`}></div>
                  <div className="bg-blue-500 w-[20%]" title={`${t.storage} 20%`}></div>
                  <div className="bg-green-500 w-[10%]" title={`${t.network} 10%`}></div>
                </div>
                <div className="flex justify-between text-xs text-gray-400 mt-2">
                  <span className="flex items-center gap-1"><span className="inline-block w-2 h-2 bg-purple-500 rounded-full"></span>{t.gpu} 70%</span>
                  <span className="flex items-center gap-1"><span className="inline-block w-2 h-2 bg-blue-500 rounded-full"></span>{t.storage} 20%</span>
                  <span className="flex items-center gap-1"><span className="inline-block w-2 h-2 bg-green-500 rounded-full"></span>{t.network} 10%</span>
                </div>
              </div>
            </div>

            {/* Global Limits & Settings */}
            <div className="space-y-6">

              <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                <h3 className="text-lg font-semibold mb-4 text-orange-400">{t.global_limits}</h3>

                <div className="mb-4">
                  <div className="flex justify-between text-sm mb-1">
                    <span>{t.budget_cap}</span>
                    <span>{formatCurrency(currentCost)} / {formatCurrency(budgetCap)}</span>
                  </div>
                  <div className="h-2 bg-black rounded overflow-hidden border border-gray-800">
                    <div className="h-full bg-orange-500 transition-all" style={{width: `${Math.min((currentCost/budgetCap)*100, 100)}%`}}></div>
                  </div>
                  <input type="range" min="10" max="1000" step="10" value={budgetCap} onChange={e => setBudgetCap(Number(e.target.value))} className="w-full mt-2 h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer" />
                </div>

                <div>
                  <div className="flex justify-between text-sm mb-1">
                    <span>{t.eco_cap}</span>
                    <span>{emissions.toFixed(0)} / {ecoCap}</span>
                  </div>
                  <div className="h-2 bg-black rounded overflow-hidden border border-gray-800">
                    <div className="h-full bg-green-500 transition-all" style={{width: `${Math.min((emissions/ecoCap)*100, 100)}%`}}></div>
                  </div>
                  <input type="range" min="100" max="20000" step="100" value={ecoCap} onChange={e => setEcoCap(Number(e.target.value))} className="w-full mt-2 h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer" />
                </div>
              </div>

              <div className="grid grid-cols-2 gap-4">
                <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                  <h3 className="text-md font-semibold mb-4 text-pink-400">{t.advanced}</h3>

                  <label className="flex items-center gap-2 mb-3 cursor-pointer">
                    <input type="checkbox" checked={diesel} onChange={e => setDiesel(e.target.checked)} className="form-checkbox w-4 h-4 bg-black border-gray-600 rounded text-red-500 focus:ring-0" />
                    <span className="text-sm">{t.diesel}</span>
                  </label>

                  <label className="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" checked={immersion} onChange={e => setImmersion(e.target.checked)} className="form-checkbox w-4 h-4 bg-black border-gray-600 rounded text-blue-500 focus:ring-0" />
                    <span className="text-sm">{t.immersion}</span>
                  </label>
                </div>

                <div className="bg-gray-900 rounded-xl p-6 border border-gray-800">
                  <h3 className="text-md font-semibold mb-4 text-teal-400">{t.thresholds}</h3>
                  <div className="mb-3">
                    <label className="block text-xs text-gray-400 mb-1">{t.green_limit}: {thresholdG}</label>
                    <input type="range" min="50" max="500" value={thresholdG} onChange={handleThresholdG} className="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                  </div>
                  <div>
                    <label className="block text-xs text-gray-400 mb-1">{t.yellow_limit}: {thresholdY}</label>
                    <input type="range" min="100" max="1000" value={thresholdY} onChange={handleThresholdY} className="w-full h-1 bg-gray-700 rounded-lg appearance-none cursor-pointer" />
                  </div>
                </div>
              </div>

            </div>

          </div>

          <div className="mt-10 flex justify-center pb-10">
            <button onClick={handleDownload} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-full shadow-[0_0_15px_rgba(37,99,235,0.5)] transition-all transform hover:scale-105">
              ⬇ {t.download}
            </button>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
